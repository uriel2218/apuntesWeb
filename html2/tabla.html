<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse :collapse;
        }
    </style>
</head>
<body>
    <h1>Práctica 3 - HTML</h1>

    <!--Tablas-->
    <table style="width: 1000px">
        <thead>
            <tr>
                <th>Indice</th>
                <th>Producto</th>
                <th>Descripción</th>
                <th>Precio</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Shampoo</td>
                <td>Shampoo antipulgas de 500 ml</td>
                <td>$50</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Correa</td>
                <td>Correa para mascota de 3 m</td>
                <td>$80</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Placa</td>
                <td>Placa de metal sin grabar</td>
                <td>$120</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Croquetas</td>
                <td>Costo por kilo de croquetas</td>
                <td>$25</td>
            </tr>

        </tbody>
        <tfoot>
            <tr>
                <th colspan="3">Total</th>
                <td>$275</td>
            </tr>
        </tfoot>

    </table>
</body>
</html>
